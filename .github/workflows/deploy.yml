# ============================================================================
# نشر التوثيق التقنيّ للغة ص — **قناتان** على GitHub Pages عند كل دفع إلى main:
#   • المستقرّ (sadlang)  →  الجذر /            (الافتراضيّ للمستخدم)
#   • القادم  (dev)       →  /next/             (يكتبه المطوّر وقت التطوير)
# لكلّ قناة تُعاد توليد صفحات المرجع من language-truth/ في فرعها، فتبقى متّسقة.
# المصدر: mdBook + mdbook-mermaid  →  site/  +  site/next/  →  Pages
# ============================================================================
name: نشر التوثيق (قناتان → Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE: /sadlang-docs/        # مسار جذر صفحات المشروع (للروابط بين القناتين)
    steps:
      - name: جلب مستودع التوثيق
        uses: actions/checkout@v4

      - name: تثبيت mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: تثبيت mdbook-mermaid + أصوله
        run: |
          cargo install mdbook-mermaid --locked
          mdbook-mermaid install .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml

      # ── القناة المستقرّة: من فرع sadlang إلى الجذر ──────────────────────────
      - name: جلب language-truth/ (sadlang)
        uses: actions/checkout@v4
        with:
          repository: sadlang/s-programming-language
          ref: sadlang
          path: _lang-stable
          sparse-checkout: language-truth
          sparse-checkout-cone-mode: true

      - name: بناء القناة المستقرّة
        run: |
          python scripts/gen_reference.py --source-dir _lang-stable --source-ref sadlang
          cat > theme/channel-banner.js <<EOF
          (function(){var b=document.createElement("div");b.dir="rtl";
          b.style.cssText="background:#2b8a3e;color:#fff;text-align:center;padding:6px 10px;font-size:.9em;";
          b.innerHTML='📕 الإصدار <b>المستقرّ</b> · <a style="color:#fff;text-decoration:underline" href="${BASE}next/">الإصدار القادم (dev) ←</a>';
          document.body.insertBefore(b,document.body.firstChild);})();
          EOF
          mdbook build -d site

      # ── القناة القادمة: من فرع dev إلى /next/ ───────────────────────────────
      - name: جلب language-truth/ (dev)
        uses: actions/checkout@v4
        with:
          repository: sadlang/s-programming-language
          ref: dev
          path: _lang-next
          sparse-checkout: language-truth
          sparse-checkout-cone-mode: true

      - name: بناء القناة القادمة
        run: |
          python scripts/gen_reference.py --source-dir _lang-next --source-ref dev
          cat > theme/channel-banner.js <<EOF
          (function(){var b=document.createElement("div");b.dir="rtl";
          b.style.cssText="background:#e8590c;color:#fff;text-align:center;padding:6px 10px;font-size:.9em;";
          b.innerHTML='🚧 الإصدار <b>القادم</b> (dev) — قد يحوي ميزات غير منشورة · <a style="color:#fff;text-decoration:underline" href="${BASE}">→ الإصدار المستقرّ</a>';
          document.body.insertBefore(b,document.body.firstChild);})();
          EOF
          mdbook build -d site/next

      - name: رفع أثر Pages (القناتان)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: النشر إلى GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
